<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>音符气球小课堂</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app">
      <div class="rotate-hint" aria-hidden="true">
        <div class="rotate-icon">📱↻</div>
        <p>请把设备横过来玩哦</p>
      </div>

      <!-- ============ 首页 ============ -->
      <section class="screen screen-home is-active" data-screen="home">
        <button class="gear-btn" id="home-gear" type="button" aria-label="设置">⚙</button>
        <header class="home-title">
          <span class="note-deco">♪</span>
          <h1>音符气球小课堂</h1>
          <span class="note-deco">♪</span>
        </header>

        <div class="home-cards">
          <div class="home-card-wrap">
            <button class="home-card" id="card-sing" type="button" aria-label="唱谱模式">
              <img src="assets/sprites/png/btn_home_sing_card.png" alt="唱谱模式">
            </button>
            <span class="pill" id="pill-sing">需要校准</span>
          </div>
          <div class="home-card-wrap">
            <button class="home-card" id="card-play" type="button" aria-label="弹奏模式">
              <img src="assets/sprites/png/btn_home_play_card.png" alt="弹奏模式">
            </button>
            <span class="pill" id="pill-play">需要校准</span>
          </div>
          <div class="home-card-wrap">
            <button class="home-card" id="card-calibration" type="button" aria-label="声音校准">
              <img src="assets/sprites/png/btn_home_calibration_card.png" alt="声音校准">
            </button>
            <span class="pill" id="pill-calibration">需要校准</span>
          </div>
        </div>
      </section>

      <!-- ============ 声音校准 ============ -->
      <section class="screen screen-calibration" data-screen="calibration" hidden>
        <header class="cal-top">
          <button class="round-btn round-home" data-go-home type="button" aria-label="返回首页"></button>
          <div class="cal-title">
            <span class="note-deco">♪</span>
            <h2>声音校准</h2>
            <span class="note-deco">♪</span>
          </div>
          <span class="env-pill" id="cal-env-pill">等待麦克风</span>
        </header>

        <div class="cal-cards">
          <section class="cal-card cal-card-sing">
            <div class="cal-card-head sing">🎤 唱谱校准</div>
            <p class="cal-instruction">请对着麦克风，依次唱 <b>Do Re Mi</b><br><small>唱清楚，保持音调稳定哦！</small></p>
            <div class="syllable-strip" id="cal-syllables"></div>
            <p class="cal-tip">⭐ 小提示：用自然的声音，像说话一样放松即可。</p>
          </section>

          <section class="cal-card cal-card-play">
            <div class="cal-card-head play">🎹 钢琴校准</div>
            <p class="cal-instruction">请弹钢琴上的<b>中央 C 键</b><br><small>按住 2~3 秒，直到指示稳定</small></p>
            <div class="central-c-row">
              <div class="c-badge"><span>中央 C</span><strong>C</strong><i class="c-star">★</i></div>
              <div class="gauge">
                <span>低</span>
                <div class="gauge-rail"><i id="cal-needle"></i></div>
                <span>高</span>
              </div>
            </div>
            <strong class="c-result" id="cal-c-result">等待中央 C</strong>
            <div class="mini-piano" id="cal-mini-piano"></div>
            <p class="cal-tip">⭐ 小提示：请在安静环境下弹奏，更容易校准哦！</p>
          </section>
        </div>

        <div class="cal-env">
          <span class="cal-env-label">🔊 环境监听<small>当前环境音量</small></span>
          <div class="env-meter"><span id="cal-level"></span></div>
          <span class="cal-env-state" id="cal-env-state">当前：等待 🙂</span>
        </div>

        <div class="cal-actions">
          <button class="big-btn green" id="cal-start" type="button">▶ 开始校准<small>一步步完成校准</small></button>
          <button class="big-btn yellow" id="cal-done" type="button">✓ 完成并返回<small>保存设置并返回主页</small></button>
          <button class="big-btn plain" id="cal-reset" type="button">⟳ 重置校准<small>清除当前校准结果</small></button>
        </div>
      </section>

      <!-- ============ 游戏(唱谱 / 弹奏共用) ============ -->
      <section class="screen screen-game" data-screen="game" hidden>
        <header class="game-hud">
          <button class="round-btn round-home" data-go-home type="button" aria-label="返回首页"></button>
          <div class="hud-chip"><span>得分</span><strong id="score">0</strong></div>
          <div class="hud-chip"><span>连击</span><strong id="streak">0</strong></div>
          <div class="hud-instruction">
            <strong id="hud-title">看气球里的音</strong>
            <span id="hud-sub">命中后音符会飞上去填在乐谱上哦！</span>
          </div>
          <div class="hud-chip"><span>进度</span><strong id="progress">0 / 8</strong></div>
          <button class="round-btn round-replay" id="replay-btn" type="button" aria-label="回放"></button>
        </header>

        <div class="game-stage">
          <canvas id="game-canvas" width="1080" height="720"></canvas>
        </div>

        <img id="keyboard-strip" class="keyboard-strip" src="assets/sprites/png/keyboard_reference_strip.png" alt="键盘参考" hidden>

        <div class="game-listen">
          <button class="listen-mic" id="game-mic" type="button" aria-label="打开麦克风">🎤</button>
          <div class="listen-meter"><span id="game-level"></span></div>
          <div class="heard">听到 <strong id="detected-note">--</strong> <small id="detected-cents"></small></div>
          <span class="feedback" id="feedback">看气球上的音，准备发射音符</span>
        </div>

        <div class="input-pad" id="input-pad"></div>
      </section>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
